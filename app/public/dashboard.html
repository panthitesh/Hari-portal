<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Employee Portal</title>
<style>

body{

margin:0;

font-family:system-ui;

background:linear-gradient(180deg,#0f172a,#020617);

color:white;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px;

}

.profile{

display:flex;

align-items:center;

gap:10px;

}

.avatar{

width:38px;

height:38px;

border-radius:50%;

background:#3b82f6;

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

}

.name{

font-size:16px;

font-weight:600;

}

.card{

background:#111827;

margin:15px;

padding:20px;

border-radius:14px;

box-shadow:0 8px 30px rgba(0,0,0,0.5);

}

.timer{

font-size:34px;

color:#38bdf8;

margin-bottom:10px;

}

button{

background:#22c55e;

border:none;

padding:12px 28px;

border-radius:10px;

font-size:16px;

color:white;

}

.row{

display:flex;

justify-content:space-between;

padding:12px 0;

border-bottom:1px solid #1f2937;

}

.bottom{

position:fixed;

bottom:0;

width:100%;

background:#020617;

display:flex;

justify-content:space-around;

padding:14px;

}

.bottom a{

color:white;

text-decoration:none;

font-size:14px;

}
</style>
</head>
<body>
<div class="header">
<div class="profile">
<div class="avatar">E</div>
<div>
<div class="name">Employee</div>
<div style="font-size:12px;color:gray">General Shift</div>
</div>
</div>
<div style="font-size:20px">🔔</div>
</div>

<div class="card">
<div class="timer" id="timer">00:00:00</div>
<form action="/attendance" method="POST" enctype="multipart/form-data">
<input type="file" name="selfie">
<br><br>
<button>Check-In</button>
</form>
</div>

<div class="card">
<h3>Work Schedule</h3>
<div class="row"><span>Monday</span><span>09:30 AM - 06:00 PM</span></div>
<div class="row"><span>Tuesday</span><span>09:30 AM - 06:00 PM</span></div>
<div class="row"><span>Wednesday</span><span>09:30 AM - 06:00 PM</span></div>
<div class="row"><span>Thursday</span><span>09:30 AM - 06:00 PM</span></div>
<div class="row"><span>Friday</span><span>09:30 AM - 06:00 PM</span></div>
</div>

<div class="card">
<h3>Attendance Logs</h3>
<div class="row"><span>08 Mar</span><span>10:44 Hrs</span></div>
<div class="row"><span>09 Mar</span><span>10:51 Hrs</span></div>
<div class="row"><span>10 Mar</span><span>10:38 Hrs</span></div>
</div>

<div class="bottom">
<a href="dashboard.html">🏠 Home</a>
<a href="leave.html">🌴 Leave</a>
<a href="attendance.html">⏱ Attendance</a>
<a href="more.html">⚙ More</a>
</div>
<script>

let seconds=0

setInterval(function(){

seconds++

let hrs=String(Math.floor(seconds/3600)).padStart(2,'0')

let mins=String(Math.floor((seconds%3600)/60)).padStart(2,'0')

let secs=String(seconds%60).padStart(2,'0')

document.getElementById("timer").innerText=hrs+":"+mins+":"+secs

},1000)
</script>
</body>
</html>
